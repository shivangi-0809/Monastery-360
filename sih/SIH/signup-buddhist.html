<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buddhist Signup</title>
  <link rel="stylesheet" href="new.css">
</head>
<body>
  <div class="form-container">
    <h2>Buddhist Signup</h2>
    <form action="buddhist-dashboard.html" method="get">
  <label>Full Name:</label>
  <input type="text" required>

  <label>Email:</label>
  <input type="email" required>

  <label>Password:</label>
  <input type="password" required>

  <label>Select Monastery:</label>
  <select required>
    <option value="">-- Select Monastery --</option>
    <option value="rumtek">Rumtek</option>
    <option value="pemayangtse">Pemayangtse</option>
    <option value="tashiding">Tashiding</option>
  </select>

  <button type="submit">Signup</button>
</form>

  </div>
</body>
</html>
