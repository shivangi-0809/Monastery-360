<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumtek Monastery - Map View</title>
    <style>
        /* Basic CSS to make the map fill the entire screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars */
        }
        iframe {
            border: none; /* Removes the default iframe border */
        }
    </style>
</head>
<body>

    <!-- This iframe will display the Google Map and fill the entire page -->
    <iframe 
        src="https://maps.google.com/maps?q=27.3015,88.5721&t=k&z=17&ie=UTF8&iwloc=&output=embed" 
        width="100%" 
        height="100%" 
        allowfullscreen="" 
        loading="lazy">
    </iframe>

</body>
</html>
