<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buddhist Dashboard</title>
  <link rel="stylesheet" href="new.css">
</head>
<body>
  <div class="dashboard">
    <h2>Welcome, Buddhist Head</h2>
    <p>Select an option below to manage manuscripts and monastery documents:</p>

    <div class="dashboard-options">
      <!-- Scan -->
      <div class="cardss">
        <h3>📷 Scan Document</h3>
        <p>Use your camera or scanner to capture manuscripts.</p>
        <button onclick="alert('Scanning feature to be integrated with mobile/camera API')">Start Scan</button>
      </div>

      <!-- Upload -->
      <div class="cardss">
        <h3>📂 Upload Manuscript</h3>
        <p>Upload monastery records, manuscripts, or documents.</p>
        <form>
          <input type="file" accept=".pdf,.jpg,.png,.docx">
          <button type="submit">Upload</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
